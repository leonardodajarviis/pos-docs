<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title | default: "POS Documentation" }}</title>
  
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #24292e;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
    }
    
    .container-lg {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .markdown-body {
      box-sizing: border-box;
      padding: 45px;
      background-color: #fff;
    }
    
    .markdown-body h1 {
      padding-bottom: 0.3em;
      font-size: 2em;
      border-bottom: 1px solid #eaecef;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    
    .markdown-body h2 {
      padding-bottom: 0.3em;
      font-size: 1.5em;
      border-bottom: 1px solid #eaecef;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    
    .markdown-body h3 {
      font-size: 1.25em;
      margin-top: 24px;
      margin-bottom: 16px;
    }
    
    .markdown-body p {
      margin-top: 0;
      margin-bottom: 16px;
    }
    
    .markdown-body ul, .markdown-body ol {
      padding-left: 2em;
      margin-top: 0;
      margin-bottom: 16px;
    }
    
    .markdown-body li {
      margin-bottom: 0.25em;
    }
    
    .markdown-body table {
      border-spacing: 0;
      border-collapse: collapse;
      margin-top: 0;
      margin-bottom: 16px;
      width: 100%;
    }
    
    .markdown-body table th,
    .markdown-body table td {
      padding: 6px 13px;
      border: 1px solid #dfe2e5;
    }
    
    .markdown-body table th {
      font-weight: 600;
      background-color: #f6f8fa;
    }
    
    .markdown-body table tr:nth-child(2n) {
      background-color: #f6f8fa;
    }
    
    .markdown-body code {
      padding: 0.2em 0.4em;
      margin: 0;
      font-size: 85%;
      background-color: rgba(27,31,35,0.05);
      border-radius: 3px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }
    
    .markdown-body pre {
      padding: 16px;
      overflow: auto;
      font-size: 85%;
      line-height: 1.45;
      background-color: #f6f8fa;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    
    /* Mermaid diagram styles */
    .mermaid {
      margin: 20px 0;
      padding: 20px;
      background-color: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #e1e4e8;
      text-align: center;
      overflow-x: auto;
    }
    
    .mermaid svg {
      max-width: 100%;
      height: auto;
    }
    
    .footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid #e1e4e8;
      color: #586069;
      font-size: 12px;
      text-align: right;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .markdown-body {
        padding: 15px;
      }
      
      .container-lg {
        padding: 20px 10px;
      }
    }
  </style>
  
  {% include head-custom.html %}
</head>
<body>
  <div class="container-lg px-3 my-5 markdown-body">
    {% if site.title and site.title != page.title %}
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    {% endif %}

    {{ content }}

    {% if site.github.private != true and site.github.license %}
    <div class="footer border-top border-gray-light mt-5 pt-3 text-right text-gray">
      This site is open source. {% github_edit_link "Improve this page" %}.
    </div>
    {% endif %}
  </div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

    // Cấu hình Mermaid
    mermaid.initialize({ startOnLoad: false }); // Tắt tự động để ta tự điều khiển

    document.addEventListener("DOMContentLoaded", function () {
      // Tìm tất cả các khối code có đánh dấu là mermaid
      const codeBlocks = document.querySelectorAll('pre > code.language-mermaid, pre.mermaid, code.mermaid');

      codeBlocks.forEach((codeBlock, index) => {
        const definition = codeBlock.textContent; // Lấy nội dung mã sơ đồ
        const container = document.createElement('div');
        container.className = 'mermaid';
        container.innerHTML = definition;

        // Thay thế khối code cũ bằng div mới
        const parent = codeBlock.parentElement;
        if (parent.tagName === 'PRE') {
          parent.replaceWith(container);
        } else {
          codeBlock.replaceWith(container);
        }
      });

      // Lệnh quan trọng: Bảo Mermaid quét và vẽ lại toàn bộ
      mermaid.run();
    });
  </script>
</body>
</html>
